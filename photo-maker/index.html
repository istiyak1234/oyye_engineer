<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Passport Photo Maker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    video, canvas {
      border: 2px solid #007bff;
      border-radius: 10px;
      width: 320px;
      height: 240px;
    }
  </style>
</head>
<body class="bg-light text-center p-4">

  <h2 class="mb-4">📸 Passport Size Photo Creator</h2>
  <video id="camera" autoplay></video>
  <br><br>
  <button id="captureBtn" class="btn btn-primary">Capture Photo</button>
  <canvas id="photoCanvas" style="display:none;"></canvas>
  <br><br>
  <img id="preview" class="border rounded shadow" style="display:none; max-width:300px;"/>

  <br><br>
  <form id="uploadForm" method="POST" action="generate.php" target="_blank">
    <input type="hidden" name="imageData" id="imageData">
    <button type="submit" class="btn btn-success" style="display:none;" id="generateBtn">Generate Passport Sheet</button>
  </form>

  <script>
    const video = document.getElementById('camera');
    const canvas = document.getElementById('photoCanvas');
    const context = canvas.getContext('2d');
    const preview = document.getElementById('preview');
    const imageDataInput = document.getElementById('imageData');
    const captureBtn = document.getElementById('captureBtn');
    const generateBtn = document.getElementById('generateBtn');

    // Get webcam
    navigator.mediaDevices.getUserMedia({ video: true })
      .then(stream => { video.srcObject = stream; })
      .catch(err => alert("Camera access denied: " + err));

    // Capture photo
    captureBtn.onclick = () => {
      canvas.width = 600;
      canvas.height = 600;
      context.drawImage(video, 0, 0, 600, 600);
      const imageData = canvas.toDataURL('image/jpeg');
      preview.src = imageData;
      preview.style.display = 'block';
      imageDataInput.value = imageData;
      generateBtn.style.display = 'inline-block';
    };
  </script>

</body>
</html>
